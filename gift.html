<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow-x:hidden;
  font-family:'Poppins';
  background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
  color:white;
}

/* CENTER TEXT */
.center{
  position:absolute;
  top:22%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
}

h1{
  font-family:'Dancing Script';
  font-size:2.2em;
}

.glow{
  text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}

#letter{
  font-size:14px;
  margin-top:10px;
  line-height:1.5;
}

/* PHOTO CARD */
.photo-box{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:300px;
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  text-align:center;
  animation: float 3s ease-in-out infinite;
}

.photo-box img{
  width:100%;
  border-radius:10px;
}

#caption{
  margin-top:8px;
  color:#ff4d6d;
  font-size:13px;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%,100%{ transform:translate(-50%,-50%); }
  50%{ transform:translate(-50%,-53%); }
}

/* HEARTS & PAWS */
.heart,.paw{
  position:fixed;
  bottom:-20px;
  font-size:18px;
  animation: floatUp linear forwards;
}

@keyframes floatUp{
  to{ transform:translateY(-100vh); opacity:0; }
}

/* FINAL BUTTON */
button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  margin:8px;
  width:140px;
}
  /* CONFETTI CANVAS */
#confettiCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:999;
}

/* LOVE TEXT EXPLOSION */
#loveExplosion{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:40px;
  font-family:'Dancing Script';
  color:#fff;
  text-shadow:0 0 20px #ff4d6d,0 0 40px #ff4d6d;
  opacity:0;
  z-index:1000;
}

/* ANIMATION */
.showLove{
  animation: explode 1.5s ease forwards;
}

@keyframes explode{
  0%{ transform:translate(-50%,-50%) scale(0.3); opacity:0;}
  50%{ transform:translate(-50%,-50%) scale(1.2); opacity:1;}
  100%{ transform:translate(-50%,-50%) scale(1); opacity:1;}
}

/* MOBILE FIX */
@media(max-width:480px){
  h1{
    font-size:1.9em;
  }

  #letter{
    font-size:13px;
  }

  .photo-box{
    top:70%;
  }
}
</style>
</head>

<body onclick="startExperience()">

<div class="center">
  <h1>For <span class="glow">Hasiniiii ❤️</span></h1>
  <div id="letter"></div>

 <div id="final" style="display:none;">
  <h2 style="font-size:20px; line-height:1.5;">
    Heyy my lil potatooo 🥺💖 <br>
    I just have one question... <br><br>
    Will you stay with me forever? 💍❤️
  </h2>

  <button onclick="yes()">YES ❤️</button>
  <button onclick="yes()">FOREVER 💖</button>
   <canvas id="confettiCanvas"></canvas>

<div id="loveExplosion">
  I LOVE YOU ❤️
</div>
</div>
</div>

<!-- PHOTO SLIDER -->
<div class="photo-box">
  <img id="slider" src="images/pic1.jpg">
  <p id="caption">Our first beautiful memory 💖</p>
</div>

<audio id="music" src="music.mp3"></audio>
<audio id="voice" src="voice.mp3"></audio>

<script>
let started=false;

function startExperience(){
  if(started) return;
  started=true;

  document.getElementById("music").play();
  document.getElementById("voice").play();
}

/* PHOTO SLIDER */
const images = [
  "images/pic1.jpg",
  "images/pic2.jpg",
  "images/pic3.jpg",
  "images/pic4.jpg",
  "images/pic5.jpg",
  "images/pic6.jpg"
];

const captions = [
  "Our first beautiful memory 💖",
  "Your smile = my happiness 😊",
  "My favorite person ❤️",
  "Every moment with you is special ✨",
  "You make my world better 🌍💖",
  "Forever with you 🥺❤️"
];

let index = 0;

setInterval(()=>{
  index = (index + 1) % images.length;
  document.getElementById("slider").src = images[index];
  document.getElementById("caption").innerText = captions[index];
}, 3000);

/* HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"%";
  h.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),7000);
},500);

/* PAWS */
setInterval(()=>{
  let p=document.createElement("div");
  p.className="paw";
  p.innerText="🐾";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*3)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),8000);
},1500);

/* LOVE LETTER */
const text="HER_NAME... ❤️ You are my happiness, my peace, my everything. These 6 months with you are the most beautiful part of my life. I just want to stay with you forever 🥺💖";
let j=0;

function type(){
  if(j<text.length){
    document.getElementById("letter").innerHTML+=text.charAt(j);
    j++;
    setTimeout(type,35);
  }else{
    document.getElementById("final").style.display="block";
  }
}
type();

/* FINAL BUTTON */
function yes(){
  startConfetti();

  let love = document.getElementById("loveExplosion");
  love.classList.add("showLove");

 setTimeout(()=>{
   love.innerText = "I love you forever ❤️🥺";
}, 2000);
}
  const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function createConfetti(){
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*6+2,
      d: Math.random()*5+2,
      color: `hsl(${Math.random()*360},100%,50%)`
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle=c.color;
    ctx.fill();
  });

  updateConfetti();
}

function updateConfetti(){
  confetti.forEach(c=>{
    c.y += c.d;
    if(c.y > canvas.height){
      c.y = -10;
      c.x = Math.random()*canvas.width;
    }
  });
}

function startConfetti(){
  confetti = [];
  createConfetti();

  let interval = setInterval(drawConfetti, 20);

  setTimeout(()=>{
    clearInterval(interval);
    ctx.clearRect(0,0,canvas.width,canvas.height);
  },4000);
}
</script>

</body>
</html>
