<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  color:white;
  background: linear-gradient(to top, #a8edea, #fed6e3);
  transition:0.8s;
  overflow-x:hidden;
}

/* NIGHT MODE */
body.night{
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
}

/* 🌙 BUTTON TOP RIGHT */
#nightBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:1000;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

/* SKY */
.sky{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.cloud{
  position:absolute;
  background:white;
  border-radius:50px;
}
.cloud::before,.cloud::after{
  content:'';
  position:absolute;
  background:white;
  border-radius:50%;
}
.cloud::before{width:60px;height:60px;top:-30px;left:10px;}
.cloud::after{width:80px;height:80px;top:-40px;right:10px;}

.c1{width:120px;height:50px;top:20%;animation:moveCloud 25s linear infinite;}
.c2{width:150px;height:60px;top:40%;animation:moveCloud 35s linear infinite;}
.c3{width:100px;height:40px;top:60%;animation:moveCloud 30s linear infinite;}

@keyframes moveCloud{
  from{left:-200px;}
  to{left:100%;}
}

/* NIGHT SKY */
.night-sky{
  position:fixed;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.8s;
  z-index:-1;
}
body.night .night-sky{opacity:1;}

.moon{
  position:absolute;
  top:60px;
  right:30px;
  width:60px;
  height:60px;
  background:white;
  border-radius:50%;
}

.stars span{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0.2;}
  50%{opacity:1;}
}

/* CENTER */
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
  text-align:center;
}

/* TEXT */
h1{
  font-family:'Dancing Script';
  color:#ff4d6d;
}

#letter{
  font-family:'Dancing Script';
  color: pink;
  font-size:18px;
  line-height:1.7;
;
}

#proposalText{
  font-family:'Dancing Script';
  color: #ff4d6d;
  font-size:22px;
}

/* BUTTONS */
button{
  padding:10px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:8px;
}

/* PHOTO */
#photoBox{
  display:none;
  margin-top:20px;

  width:75%;          /* smaller width */
  max-width:220px;    /* limit size */

  margin-left:auto;
  margin-right:auto;
}

.photo-box img{
  width:100%;
  border-radius:18px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.3),
    0 0 15px rgba(255,105,180,0.4);

  transition:opacity 0.5s;
  animation: zoomEffect 6s ease-in-out infinite alternate;
}
@keyframes zoomEffect{
  0%{transform:scale(1);}
  100%{transform:scale(1.1);}
}

#caption{
  font-family:'Dancing Script';
  color:#ff4d6d;
  margin-top:5px;
}

/* LOVE TEXT */
/* #loveExplosion{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:32px;
  font-family:'Dancing Script';
  color:#ff2e63;
  opacity:0;
} */

.showLove{
  animation:boom 2s forwards;
}

@keyframes boom{
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1;}
}

/* FINAL SURPRISE PERFECT CENTER */
#finalSurprise{
  position:relative;   /* change from fixed */
  margin-top:20px;

  width:85%;
  max-width:300px;

  font-family:'Dancing Script';
  font-size:20px;
  text-align:center;

  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;

  opacity:0;
  transform:scale(0.8);
}

.showFinal{
  animation:finalPop 1.5s forwards;
}

@keyframes finalPop{
  0%{transform:scale(0.8); opacity:0;}
  100%{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<button id="nightBtn" onclick="toggleNight()">🌙</button>

<div class="sky">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<div class="night-sky">
  <div class="moon"></div>
  <div class="stars"></div>
</div>

<div class="center">

<h1>For Hasiniiii ❤️</h1>

<div id="letter"></div>

<div id="final" style="display:none;">
  <h2 id="proposalText"></h2>

  <div id="buttons" style="display:none;">
    <button onclick="yes()">YES ❤️</button>
    <button id="noBtn">NO 😢</button>
  </div>
</div>

<div class="photo-box" id="photoBox">
  <img id="slider" src="images/img1.jpg">
  <p id="caption"></p>
</div>

</div>

<div id="loveExplosion">I LOVE YOU ❤️</div>

<div id="finalSurprise">
  💖 You said YES... <br><br>
  Now you’re stuck with me forever 😏❤️ <br><br>
  I promise to love you, irritate you, and make you smile every day 💕
</div>

<script>
function toggleNight(){
  document.body.classList.toggle("night");
}

/* STARS */
const starsContainer=document.querySelector(".stars");
for(let i=0;i<50;i++){
  const s=document.createElement("span");
  s.style.top=Math.random()*100+"vh";
  s.style.left=Math.random()*100+"vw";
  starsContainer.appendChild(s);
}

/* LETTER */
const text="Hasiniiii... ❤️ You are my happiness, my peace, my everything. These 6 months with you are the most beautiful part of my life. I just want to stay with you forever,and want to irritate you and you might see a bad boy in me sometimes the way i behave like a clingy person sorry for that  🥺💖";

let i=0;
function type(){
  if(i<text.length){
    letter.textContent+=text[i++];
    setTimeout(type,30);
  }else{
    final.style.display="block";
    typeProposal();
  }
}

/* PROPOSAL */
const proposal="Heyy my lil potatooo 🥺💖\nI just have one question...\n\nWill you stay with me forever? 💍❤️";
let j=0;

function typeProposal(){
  if(j<proposal.length){
    let char=proposal[j];
    if(char === "\n"){
      proposalText.innerHTML+="<br>";
    }else{
      proposalText.innerHTML+=char;
    }
    j++;
    setTimeout(typeProposal,40);
  }else{
    buttons.style.display="block";
  }
}

window.onload = () => {
  type();
};

/* YES */
function yes(){
  const loveExplosion = document.getElementById("loveExplosion");
loveExplosion.classList.remove("showLove");
void loveExplosion.offsetWidth;
loveExplosion.classList.add("showLove");
  photoBox.style.display="block";
  startSlider();

  setTimeout(()=>{
    finalSurprise.classList.add("showFinal");
  },4000);
}

/* NO BUTTON */
noBtn.onmouseover=noBtn.ontouchstart=()=>{
  noBtn.style.position="fixed";
  noBtn.style.left=Math.random()*80+"vw";
  noBtn.style.top=Math.random()*80+"vh";
};

/* SLIDER */
const images=[
 "images/first.jpg",
 "images/dur.jpg",
 "images/lake.jpg",
 "images/booth.jpg",
 "images/event.jpg",
 "images/pretty.jpg"
];

const captions=[
 "💖 – Where it all started",
 "😊 – Getting closer",
 "❤️ – travelling together", 
 "😘 – making memories",
 "🌹 – being together",
 "😍 – my gorgeous"
];

let index=0;

function startSlider(){
  const img = document.getElementById("slider");
  const caption = document.getElementById("caption");

  caption.innerText = captions[0];

  setInterval(() => {

    img.style.transition = "opacity 0.6s ease-in-out";
    img.style.opacity = 0;

    setTimeout(() => {
      index = (index + 1) % images.length;

      img.src = images[index];
      caption.innerText = captions[index];

      img.style.opacity = 1;
    }, 600);

  }, 3500);
}
</script>

</body>
</html>
