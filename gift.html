<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow-x:hidden;
  font-family:'Poppins';
  background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
  color:white;
}

/* TEXT AREA */
.center{
  position:absolute;
  top:25%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
}

h1{
  font-family:'Dancing Script';
  font-size:2.2em;
}

#letter{
  font-size:14px;
  margin-top:10px;
}

/* PROPOSAL */
#final{
  display:none;
  margin-top:15px;
  animation: fadeIn 1.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  margin:10px;
  width:140px;
  font-size:16px;
}

button:active{
  transform:scale(0.9);
}

/* PHOTO */
.photo-box{
  position:absolute;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:300px;
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  text-align:center;
}

.photo-box img{
  width:100%;
  border-radius:10px;
  transition: opacity 0.5s ease-in-out;
}

#caption{
  color:#ff4d6d;
  font-size:13px;
  margin-top:5px;
}

/* CONFETTI */
#confettiCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* LOVE TEXT */
#loveExplosion{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:clamp(24px,8vw,40px);
  font-family:'Dancing Script';
  opacity:0;
  text-shadow:0 0 20px #ff4d6d;
}

.showLove{
  animation: boom 1.5s forwards;
}

@keyframes boom{
  50%{transform:translate(-50%,-50%) scale(1.2); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
}
</style>
</head>

<body onclick="startMusic()">

<div class="center">
  <h1>For Hasiniiii ❤️</h1>

  <div id="letter"></div>

  <div id="final">
    <h2 style="font-size:18px; line-height:1.5;">
      Heyy my lil potatooo 🥺💖 <br>
      I just have one question... <br><br>
      Will you stay with me forever? 💍❤️
    </h2>

    <button onclick="yes()">YES ❤️</button>
    <button onclick="yes()">FOREVER 💖</button>
  </div>
</div>

<!-- PHOTO SLIDER -->
<div class="photo-box">
  <img id="slider" src="images/pic1.jpg">
  <p id="caption">Month 1 💖 – Where it all started</p>
</div>

<canvas id="confettiCanvas"></canvas>
<div id="loveExplosion">I LOVE YOU ❤️</div>

<audio id="music" src="music.mp3"></audio>

<script>
function startMusic(){
  document.getElementById("music").play();
}

/* TYPE LETTER */
const text="Hasiniiii... ❤️ You are my happiness, my peace, my everything. These 6 months with you are the most beautiful part of my life. I just want to stay with you forever 🥺💖";
let i=0;

function type(){
  if(i<text.length){
    document.getElementById("letter").innerHTML+=text[i];
    i++;
    setTimeout(type,35);
  }else{
    document.getElementById("final").style.display="block";
  }
}
type();

/* 6 PHOTO SLIDER WITH FADE */
const images=[
 "images/pic1.jpg",
 "images/pic2.jpg",
 "images/pic3.jpg",
 "images/pic4.jpg",
 "images/pic5.jpg",
 "images/pic6.jpg"
];

const captions=[
 "Month 1 💖 – Where it all started",
 "Month 2 😊 – Getting closer every day",
 "Month 3 ❤️ – You became my happiness",
 "Month 4 🥺 – So many beautiful memories",
 "Month 5 💕 – Falling more for you",
 "Month 6 💍 – Now I just want forever with you"
];

let index=0;

setInterval(()=>{
  const img=document.getElementById("slider");

  img.style.opacity=0;

  setTimeout(()=>{
    index=(index+1)%images.length;
    img.src=images[index];
    document.getElementById("caption").innerText=captions[index];
    img.style.opacity=1;
  },300);

},3000);

/* YES BUTTON */
function yes(){
  startConfetti();
  document.getElementById("loveExplosion").classList.add("showLove");
}

/* CONFETTI */
const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];

function create(){
  for(let i=0;i<80;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:4,
      d:3
    });
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();
    c.y+=c.d;
  });
}

function startConfetti(){
  confetti=[];
  create();
  let t=setInterval(draw,20);
  setTimeout(()=>clearInterval(t),4000);
}
</script>

</body>
</html>
